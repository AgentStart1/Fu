name: Android Test

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.kt'
      - '**/*.xml'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew check koverXmlReport
